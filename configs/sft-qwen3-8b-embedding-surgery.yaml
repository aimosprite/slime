# SFT Embedding Surgery — Qwen3-8B
# Goal: Re-learn embeddings after random re-init; transformer frozen, only embed_tokens + lm_head trained.
# Keys → uppercase env vars; env vars already set take precedence. Secrets (WANDB_KEY, HF_TOKEN) in .env.

experiment_name:    qwen3-8b-embedding-surgery-v0  # bump version when hyperparams change significantly
experiment_version: 0

pool_dir:   /root/slime/models                  # root for all heavy artifacts; sub-paths derived in script
hf_model:   Qwen/Qwen3-8B                       # base model to download
hf_dataset: a-m-team/AM-Qwen3-Distilled         # 1.89M reasoning traces from Qwen3-235B-A22B
run_log:    /root/slime/models/run-sft.log       # tee'd stdout/stderr; tail -f to watch

do_prep:               0  # 1 on first run: download → randomize → convert → dataset; idempotent
convert_nproc_per_node: 8  # GPUs for HF → Megatron torchrun conversion

init_std:     0.02                   # N(0, init_std) re-init for embed_tokens + lm_head
init_seed:    42                     # RNG seed for weight randomization
train_params: embedding output_layer # Megatron param patterns to train; everything else frozen

input_key:           messages  # parquet column holding list of {role, content} dicts
loss_mask_type:      qwen3     # loss mask template: qwen | qwen3 | distill_qwen — must match model family
apply_chat_template: 0         # 0: messages stay as list[dict] for qwen3 loss mask generator (it applies chat template internally)
tool_key:            tools     # metadata key for tool definitions (AM dataset includes tool-call examples)
rollout_shuffle:     1         # shuffle dataset at each epoch
rollout_seed:        42        # RNG seed for data shuffle / sampling

seq_length:              8192  # max sequence length in Megatron (also sets max_position_embeddings)
rollout_max_context_len: 8192  # filter / truncate examples longer than this (prompt + response tokens)

num_epoch:          1    # full passes over AM-Qwen3-Distilled; 1 epoch ≈ 14,750 steps at gbs=128
global_batch_size:  128  # total samples per gradient update across all GPUs
rollout_batch_size: 256  # samples fetched per data-loader call; overfetch to compensate for seq_length filtering
micro_batch_size:   1    # per-GPU samples per forward pass (dynamic batching disabled: packing requires TE)
save_interval:      100  # checkpoint every N gradient steps; old checkpoints overwritten after HF upload

loss_type:                              sft_loss  # cross-entropy on assistant turns only
calculate_per_token_loss:               1         # normalize loss per token, not per sequence
disable_compute_advantages_and_returns: 1         # SFT: no RL advantages / returns needed
debug_train_only:                       1         # skip SGLang; tokenize directly from parquet

optimizer:          adam    # standard Adam; no fused kernels required
lr:                 5e-4   # peak LR; high because embeddings start from random noise
min_lr:             1e-5   # floor LR at end of cosine schedule
lr_decay_style:     cosine # cosine | linear | constant | inverse_sqrt
lr_warmup_fraction: 0.05   # fraction of total steps for linear warmup
weight_decay:       0.01   # L2 penalty; low so decay doesn't fight random→meaningful transition
clip_grad:          1.0    # gradient norm clipping
adam_beta1:         0.9    # first moment (momentum)
adam_beta2:         0.95   # second moment; lower than 0.999 for faster adaptation on random-init params

tensor_model_parallel_size:  2  # TP=2 (splits logits across 2 GPUs, avoids OOM on long seqs); DP=4
pipeline_model_parallel_size: 1  # PP=1
context_parallel_size:       1  # CP=1; not useful unless sequences > 32K
expert_model_parallel_size:  1  # EP=1; Qwen3-8B is dense (no MoE)
expert_tensor_parallel_size: 1  # ETP=1
actor_num_nodes:             1  # training nodes
actor_num_gpus_per_node:     8  # all 8 GPUs

recompute_granularity: full    # full | selective; full recomputes all activations (most memory-efficient)
recompute_method:      uniform # uniform | block
recompute_num_layers:  1       # recompute every layer (all 36 for Qwen3-8B)

attention_dropout: 0.0  # disabled for fine-tuning
hidden_dropout:    0.0  # disabled for fine-tuning

transformer_impl:  local  # local = pure PyTorch; swap to transformer_engine once TE+Apex installed
attention_backend: flash  # flash | unfused; with --transformer-impl local falls back to DotProductAttention

checkpoint_ship_enabled:   1   # upload each saved checkpoint to HF Hub in background
checkpoint_ship_poll_sec:  30  # polling interval (seconds)
checkpoint_hf_repo_id:     lerchen3/qwen3-32b-to-8b-embedding-surgery
checkpoint_hf_private:     0   # 0 = public
checkpoint_hf_create_repo: 1   # auto-create repo if not exists

wandb_project: slime-dev
wandb_group:   qwen3-8b-embedding-surgery
