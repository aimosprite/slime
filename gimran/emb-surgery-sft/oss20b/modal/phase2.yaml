# Phase 2: 100% trainable — resume from phase 1 checkpoint (loss ~7)
# Load weights only (--no-load-optim), fresh optimizer states

train_params:  # empty = train everything
seq_length: 8192
global_batch_size: 64
rollout_batch_size: 64
micro_batch_size: 1
num_epoch: 1
save_interval: 50
rollout_seed: 43

# Optimizer
lr: 1e-5
min_lr: 1e-6
lr_decay_style: cosine
lr_warmup_fraction: 0.01
weight_decay: 0.01
clip_grad: 1.0
adam_beta1: 0.9
adam_beta2: 0.95
cpu_offload: true

# Parallelism
tp: 2
pp: 1
cp: 1
ep: 2
etp: 1

# Data
input_key: messages
loss_mask_type: qwen3
apply_chat_template: false
tool_key: tools

# Eval
eval_interval: 1
eval_batch_size: 4

# WandB
wandb_project: slime-dev
wandb_group: gpt-oss-20b-emb-surgery-phase2

# Checkpoint
checkpoint_hf_repo_id: aimosprite/gpt-oss-20b-embedding-surgery
no_load_optim: true
