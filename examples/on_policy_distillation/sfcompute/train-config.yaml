# Training hyperparameters for OPD on 16x H100 (2 nodes x 8 GPUs).
# Edit this file to tune a run. Env vars always take precedence over values here.
# Paths stay in config-16xh100.env; GPU layout has moved here.

# ── Dataset ──────────────────────────────────────────────────────────
# HuggingFace dataset ID. The prep script downloads & converts it to JSONL.
# Examples:
#   BytedTsinghua-SIA/DAPO-Math-17k   (default, math reasoning)
#   OpenEvals/IMO-AnswerBench          (400 IMO short-answer problems)
dataset: OpenEvals/IMO-AnswerBench
# Field name used as the prompt (varies per dataset).
input_key: Problem
# Field name used as the ground-truth label for eval grading.
label_key: Short Answer
# Reward model type for evaluation. Available: dapo, math, boxed_math,
# deepscaler, f1, gpqa, ifbench, remote_rm.
eval_rm_type: math

# ── Models ────────────────────────────────────────────────────────────
# HuggingFace model IDs for teacher and student.
teacher_model: Qwen/Qwen3.5-122B-A10B
student_model: Qwen/Qwen3.5-35B-A3B
# Model args script for the student (under scripts/models/).
student_model_args: qwen3.5-35B-A3B.sh

# ── GPU allocation ────────────────────────────────────────────────────
# Cluster defaults:
# - 2 nodes total
# - 8 GPUs per node
# Node 1 runs teacher + Ray head; node 2 runs student workers.
cluster_num_nodes: 2
gpus_per_node: 8
# Optional override for student GPUs per worker node.
# If omitted, defaults to gpus_per_node for multi-node, or gpus_per_node/2 for single-node.
# num_gpus: 8

# Teacher server (sglang) GPU mapping.
# If omitted:
# - multi-node: uses all local GPUs (0..gpus_per_node-1)
# - single-node: uses upper half GPUs (e.g. 4..7 on 8-GPU host)
# teacher_visible_gpus: 0,1,2,3,4,5,6,7
# teacher_tp: 8
# teacher_ep: 8

# Networking:
# - ray_head_ip: IP address of this (head/teacher) node, reachable by worker nodes.
# - teacher_ip: URL host used by workers to reach teacher sglang.
#   Usually same as ray_head_ip.
# For multi-node, set these explicitly to node-1 reachable IP.
# If Tailscale is installed, setup auto-detects the node's Tailscale IPv4.
# ray_head_ip: 10.x.x.x
# teacher_ip: 10.x.x.x
# ray_port: 6379
# ray_dashboard_port: 8265
# teacher_port: 13141

# Ray/local student GPUs:
# - auto: cluster-aware default (none on multi-node head; 0..num_gpus-1 on single-node)
# - none: reserve 0 GPUs on head node (for 2-node teacher/head + worker setup)
# - CSV: explicit list, e.g. "0,1,2,3"
ray_visible_gpus: auto
# Optional override for actor worker node count.
# Defaults to cluster_num_nodes - 1 (or 1 for single-node).
# actor_num_nodes: 1

# Optional overrides (usually leave commented; defaults derive from num_gpus):
# actor_num_gpus_per_node: 8
# tensor_model_parallel_size: 2
# expert_model_parallel_size: 2
# expert_tensor_parallel_size: 2
# rollout_num_gpus_per_engine: 8
# sglang_expert_parallel_size: 8

# Memory/runtime knobs.
# use_colocate defaults to 0 on multi-node, 1 on single-node.
# use_cpu_optimizer_offload defaults to 0 on multi-node, 1 on single-node.
# train_memory_margin_bytes defaults to 1GiB on multi-node, 256MiB on single-node.
# use_colocate: 0
# use_cpu_optimizer_offload: 0
# train_memory_margin_bytes: 1073741824

# Memory fractions for teacher and student rollout sglang servers.
teacher_mem_fraction: 0.90
sglang_mem_fraction_static: 0.6

# ── Training duration ─────────────────────────────────────────────────
# num_steps controls total gradient updates.
# With the defaults below (rollout_batch_size * n_samples_per_prompt == global_batch_size)
# this equals num_rollout directly. Change only this to shorten/lengthen a run.
num_steps: 100

# ── Rollout ───────────────────────────────────────────────────────────
rollout_batch_size: 16
n_samples_per_prompt: 4
rollout_max_response_len: 16384
rollout_temperature: 1
global_batch_size: 64

# ── Optimizer ─────────────────────────────────────────────────────────
learning_rate: 1e-6
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.98

# ── Distillation / loss ───────────────────────────────────────────────
opd_kl_coef: 1.0
kl_loss_coef: 0.00
entropy_coef: 0.00

# ── Checkpointing ─────────────────────────────────────────────────────
save_interval: 10
# Optional checkpoint shipping loop (for ephemeral nodes).
# Default backend is Hugging Face Hub and auto-creates/uploads every 10 steps.
checkpoint_ship_enabled: 1
checkpoint_ship_every: 10
checkpoint_ship_poll_sec: 15
checkpoint_ship_backend: huggingface
# Optional override (recommended for team/shared runs):
# checkpoint_hf_repo_id: your-org/my-opd-checkpoints
# Basename is auto-derived from teacher/student models if not set.
checkpoint_hf_repo_type: model
checkpoint_hf_private: 1
checkpoint_hf_create_repo: 1
checkpoint_hf_upload_tracker: 1
# Advanced/custom route (takes precedence over backend if set):
# checkpoint_ship_cmd: aws s3 sync "$CHECKPOINT_ITER_DIR" "s3://your-bucket/opd-checkpoints/iter_${CHECKPOINT_STEP}/" --only-show-errors

# ── Eval ─────────────────────────────────────────────────────────────
enable_eval: 1
eval_interval: 10
n_samples_per_eval_prompt: 4
eval_max_response_len: 16384
eval_temperature: 1

# ── Tool calls ────────────────────────────────────────────────────────
# Set use_tools: 0 to disable tool calls and fall back to plain single-turn OPD.
use_tools: 1
tool_max_turns: 8
tool_max_tool_calls: 4
tool_timeout: 30
tool_concurrency: 32

# ── Performance ───────────────────────────────────────────────────────
max_tokens_per_gpu: 16384
