# Training hyperparameters for OPD on 8x H100.
# Edit this file to tune a run. Env vars always take precedence over values here.
# Paths stay in config-8xh100.env; GPU layout has moved here.

# ── Dataset ──────────────────────────────────────────────────────────
# HuggingFace dataset ID. The prep script downloads & converts it to JSONL.
# Examples:
#   BytedTsinghua-SIA/DAPO-Math-17k   (default, math reasoning)
#   OpenEvals/IMO-AnswerBench          (400 IMO short-answer problems)
dataset: OpenEvals/IMO-AnswerBench
# Field name used as the prompt (varies per dataset).
input_key: Problem
# Field name used as the ground-truth label for eval grading.
label_key: Short Answer
# Reward model type for evaluation. Available: dapo, math, boxed_math,
# deepscaler, f1, gpqa, ifbench, remote_rm.
eval_rm_type: math

# ── Models ────────────────────────────────────────────────────────────
# HuggingFace model IDs for teacher and student.
teacher_model: Qwen/Qwen3.5-122B-A10B
student_model: Qwen/Qwen3.5-35B-A3B
# Model args script for the student (under scripts/models/).
student_model_args: qwen3.5-35B-A3B.sh

# ── GPU allocation ────────────────────────────────────────────────────
# Teacher server (sglang). TEACHER_TP is auto-derived from GPU count.
# 122B-A10B needs a wider tensor-parallel shard than the old 32B teacher.
teacher_visible_gpus: 4,5,6,7
# Ray cluster: covers both student rollout and student training GPUs.
ray_visible_gpus: 0,1,2,3
# Student training (gradient updates). Must satisfy: actor_num_gpus_per_node + rollout_num_gpus <= len(ray_visible_gpus).
actor_num_gpus_per_node: 2
# Student rollout engine (sglang within Ray).
rollout_num_gpus: 2
# Tensor parallel size for student training.
tensor_model_parallel_size: 2
# Memory fractions for the two sglang servers.
teacher_mem_fraction: 0.75
sglang_mem_fraction_static: 0.6

# ── Training duration ─────────────────────────────────────────────────
# num_steps controls total gradient updates.
# With the defaults below (rollout_batch_size * n_samples_per_prompt == global_batch_size)
# this equals num_rollout directly. Change only this to shorten/lengthen a run.
num_steps: 100

# ── Rollout ───────────────────────────────────────────────────────────
rollout_batch_size: 16
n_samples_per_prompt: 4
rollout_max_response_len: 16384
rollout_temperature: 1
global_batch_size: 64

# ── Optimizer ─────────────────────────────────────────────────────────
learning_rate: 1e-6
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.98

# ── Distillation / loss ───────────────────────────────────────────────
opd_kl_coef: 1.0
kl_loss_coef: 0.00
entropy_coef: 0.00

# ── Checkpointing ─────────────────────────────────────────────────────
save_interval: 10
# Optional checkpoint shipping loop (for ephemeral nodes).
# Default backend is Hugging Face Hub and auto-creates/uploads every 10 steps.
checkpoint_ship_enabled: 1
checkpoint_ship_every: 10
checkpoint_ship_poll_sec: 15
checkpoint_ship_backend: huggingface
# Optional override (recommended for team/shared runs):
# checkpoint_hf_repo_id: your-org/my-opd-checkpoints
# Basename is auto-derived from teacher/student models if not set.
checkpoint_hf_repo_type: model
checkpoint_hf_private: 1
checkpoint_hf_create_repo: 1
checkpoint_hf_upload_tracker: 1
# Advanced/custom route (takes precedence over backend if set):
# checkpoint_ship_cmd: aws s3 sync "$CHECKPOINT_ITER_DIR" "s3://your-bucket/opd-checkpoints/iter_${CHECKPOINT_STEP}/" --only-show-errors

# ── Eval ─────────────────────────────────────────────────────────────
enable_eval: 1
eval_interval: 10
n_samples_per_eval_prompt: 4
eval_max_response_len: 16384
eval_temperature: 1

# ── Tool calls ────────────────────────────────────────────────────────
# Set use_tools: 0 to disable tool calls and fall back to plain single-turn OPD.
use_tools: 1
tool_max_turns: 8
tool_max_tool_calls: 4
tool_timeout: 30
tool_concurrency: 32

# ── Performance ───────────────────────────────────────────────────────
max_tokens_per_gpu: 16384
